<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            height: 400px;
            width: 400px;
            border: 2px solid black;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-items: center;
            text-align: center;
        }
        #container div{
            background-color: rgb(160, 160, 255);
            height: 100px;
            width: 100px;
            border: 1px solid black;
            border-radius: 16px;
            font-weight: 400;
            font-size: 50px;
        }
        #Bar{
            background-color: rgb(249, 180, 191);
            border: 2px solid rgb(34, 255, 244);
            border-radius: 5px;
            height: 50px;
            font-weight: 900px;
            display: flex;
            justify-content:flex-start;
            align-items: center;
        }
        .opt{
            font-size: 24px;
            margin-right: 40px;
        }
    </style>
</head>
<body>
    <div id="Bar">
        <div class="opt">Logo</div>
        <div class="opt">Home</div>
        <div class="opt">About</div>
        <div class="opt">Contct</div>
    </div>
    <div id="container">
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
        <div>F</div>
        <div>G</div>
        <div>H</div>
        <div>I</div>
    </div>
</body>
</html>
