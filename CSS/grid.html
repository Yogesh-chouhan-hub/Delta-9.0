<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        #container{
            display: grid;
            /* grid-template-rows:repeat(12,1fr); */
            /* grid-template-columns:repeat(12,1fr); */
            grid-template-rows: 12;
            grid-template-columns: 12;
            row-gap: 10px; 
            column-gap: 10px;
            background-color: pink;
        }
        .a{
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 1;
            grid-column-end: 12;
            background-color:red;
            justify-items: center;
            align-items:center;
        }
        .b{
            grid-row-start: 2;
            grid-row-end: 11;
            grid-column-start:1;
            grid-column-end: 4;
            background-color:blue;
        }
        .c{
            grid-row-start: 2;
            grid-row-end: 3;
            grid-column-start:4;
            grid-column-end:9;
            background-color:blanchedalmond;
        }
        .d{
            grid-row-start:2;
            grid-row-end: 11;
            grid-column-start:9;
            grid-column-end:12;
            background-color:blueviolet;
        }
        .e{
            grid-row-start:3;
            grid-row-end:11;
            grid-column-start:4;
            grid-column-end:9;
            background-color:yellowgreen;
        }
        .f{
            grid-row-start:11;
            grid-row-end: 12;
            grid-column-start:1;
            grid-column-end:12;
            background-color:royalblue;
        }
        @media(max-width:720px){
            .a{
                grid-row-start:1;
                grid-row-end: 12;
                grid-column-start:1;
                grid-column-end:12;
            }
            .b{
                grid-row-start:2;
                grid-row-end: 3;
                grid-column-start:1;
                grid-column-end:12;
            }
            .c{
                grid-row-start:3;
                grid-row-end: 11;
                grid-column-start:1;
                grid-column-end:4;
            }
            .d{
                grid-row-start:3;
                grid-row-end: 11;
                grid-column-start:4;
                grid-column-end:12;
            }
            .e{
                grid-row-start:11;
                grid-row-end: 12;
                grid-column-start:1;
                grid-column-end:4;
            }
            .a{
                grid-row-start:11;
                grid-row-end: 12;
                grid-column-start:4;
                grid-column-end:12;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="a">1</div>
        <div class="b">2</div>
        <div class="c">3</div>
        <div class="d">4</div>
        <div class="e">5</div>
        <div class="f">6</div>
    </div>
   
</body>
</html>
